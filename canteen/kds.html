<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Display System - BVRIT Canteen</title>
    <link rel="stylesheet" href="css/kds.css">
</head>
<body>
    <div class="kds-container">
        <!-- Header -->
        <header class="kds-header">
            <div class="header-content">
                <h1>🍳 Kitchen Display System</h1>
                <div class="header-info">
                    <span class="time" id="currentTime">--:--</span>
                    <span class="status-badge" id="connectionStatus">Connecting...</span>
                </div>
            </div>
        </header>

        <!-- Control Panel -->
        <div class="control-panel">
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">All Orders</button>
                <button class="filter-btn" data-filter="pending">Pending</button>
                <button class="filter-btn" data-filter="confirmed">Confirmed</button>
                <button class="filter-btn" data-filter="preparing">Preparing</button>
                <button class="filter-btn" data-filter="ready">Ready</button>
            </div>
            <div class="action-group">
                <button id="refreshBtn" class="action-btn refresh-btn">🔄 Refresh</button>
                <button id="settingsBtn" class="action-btn settings-btn">⚙️ Settings</button>
            </div>
        </div>

        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat">
                <span class="stat-label">Pending</span>
                <span class="stat-value" id="statPending">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Confirmed</span>
                <span class="stat-value" id="statConfirmed">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Preparing</span>
                <span class="stat-value" id="statPreparing">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Ready</span>
                <span class="stat-value" id="statReady">0</span>
            </div>
        </div>

        <!-- Orders Grid -->
        <main class="orders-grid" id="ordersGrid">
            <div class="loading">Loading orders...</div>
        </main>

        <!-- Debug Panel -->
        <div id="debugPanel" style="position: fixed; bottom: 20px; left: 20px; background: #1a1a1a; border: 1px solid #444; padding: 10px; border-radius: 6px; max-width: 300px; font-size: 11px; color: #888; max-height: 200px; overflow-y: auto; z-index: 500;">
            <div style="font-weight: 600; color: #fff; margin-bottom: 5px;">Debug Info</div>
            <div id="debugContent">No errors yet...</div>
        </div>
    </div>

    <!-- Order Details Modal -->
    <div class="modal" id="orderModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Order Details</h2>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="modal-close" id="settingsClose">&times;</button>
            </div>
            <div class="modal-body">
                <div style="background: #2a2a2a; padding: 15px; border-radius: 6px; margin-bottom: 20px;">
                    <h3 style="margin-top: 0; margin-bottom: 15px; color: #3498db;">Admin Login</h3>
                    <div class="setting-group">
                        <label for="adminEmail">Email:</label>
                        <input type="email" id="adminEmail" placeholder="admin@bvrit.ac.in" value="admin@bvrit.ac.in">
                    </div>
                    <div class="setting-group" style="margin-top: 10px;">
                        <label for="adminPassword">Password:</label>
                        <input type="password" id="adminPassword" placeholder="Enter admin password">
                    </div>
                    <button id="adminLoginBtn" class="action-btn settings-btn" style="width: 100%; margin-top: 10px;">Login & Get Token</button>
                </div>

                <div style="border-top: 2px solid #3498db; padding-top: 15px;">
                    <h3 style="margin-top: 0; margin-bottom: 15px; color: #3498db;">Manual Token</h3>
                    <div class="setting-group">
                        <label for="apiToken">API Token:</label>
                        <small style="color: #666; display: block; margin-top: 4px;">Or paste token here directly</small>
                        <input type="password" id="apiToken" placeholder="Paste admin token here">
                    </div>
                    <div class="setting-group" style="margin-top: 15px;">
                        <button id="testTokenBtn" class="action-btn settings-btn" style="width: 100%;">Test Token</button>
                    </div>
                </div>
                <div class="setting-group">
                    <label for="refreshRate">Refresh Rate (seconds):</label>
                    <input type="number" id="refreshRate" min="5" max="60" value="10">
                </div>
                <div class="setting-group">
                    <label>
                        <input type="checkbox" id="soundEnabled" checked>
                        Enable Sound Alerts
                    </label>
                </div>
                <div class="setting-group">
                    <label>
                        <input type="checkbox" id="autoRefresh" checked>
                        Auto-Refresh
                    </label>
                </div>
                <button class="save-btn" id="saveSettings">Save Settings</button>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // Ensure scripts load in correct order
        if (!window.KDSApiService) {
            document.addEventListener('DOMContentLoaded', () => {
                const msg = 'ERROR: Scripts did not load properly. Check console.';
                console.error(msg);
                document.getElementById('ordersGrid').innerHTML = '<div class="empty" style="color: red;">' + msg + '</div>';
            });
        }
    </script>

    <script src="js/api-service-new.js" defer></script>
    <script src="js/kds-api.js" defer></script>
    <script src="js/kds.js" defer></script>
</body>
</html>

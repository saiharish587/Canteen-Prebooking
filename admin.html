<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BVRIT Canteen - Admin Panel</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div class="brand">
                <div class="logo">🍽️ BVRIT CANTEEN</div>
                <div class="tagline">Admin Panel</div>
            </div>
            <div class="d-flex flex-wrap gap-2 align-items-center justify-content-center">
                <span class="admin-badge">⚙️ Admin Mode</span>
                <button class="logout-btn" onclick="viewMenu()" style="background:linear-gradient(90deg,#4caf50,#66bb6a);border-color:#4caf50">📋 View Menu</button>
                <button class="logout-btn" onclick="logout()">🚪 Logout</button>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="admin-header">
                <h1>🎛️ Menu Management</h1>
                <p>Edit prices, manage availability, and add/remove menu items</p>
            </div>

            <div class="controls-section">
                <input type="text" id="searchBox" class="search-box" placeholder="Search menu items...">
                <button class="filter-btn active" onclick="filterByCategory('all')">All Items</button>
                <button class="filter-btn" onclick="filterByCategory('available')">Available</button>
                <button class="filter-btn" onclick="filterByCategory('unavailable')">Unavailable</button>
                <button class="add-item-btn" onclick="openAddItemModal()">➕ Add New Item</button>
                <button class="add-item-btn" onclick="saveAllChanges()" style="background:linear-gradient(90deg,#2196f3,#1976d2)">💾 Save Changes</button>
                <button class="filter-btn" onclick="resetToDefaults()" style="background:#ff6b6b;color:white;border-color:#ff6b6b">🔄 Reset Defaults</button>
            </div>

            <div class="items-grid" id="itemsGrid">
                <!-- Items will be dynamically loaded here -->
            </div>
        </div>
    </main>

    <!-- Add Item Modal -->
    <div class="modal" id="addItemModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Add New Menu Item</h2>
                <button class="modal-close" onclick="closeAddItemModal()">✕</button>
            </div>
            <form id="addItemForm" onsubmit="addNewItem(event)">
                <div class="form-group">
                    <label for="newItemName">Item Name *</label>
                    <input type="text" id="newItemName" required>
                </div>
                <div class="form-group">
                    <label for="newItemCategory">Category *</label>
                    <select id="newItemCategory" required>
                        <option value="">Select Category</option>
                        <option value="breakfast">🌅 Breakfast</option>
                        <option value="meals">🍛 Meals</option>
                        <option value="veg">🥬 Veg</option>
                        <option value="nonveg">🍗 Non-Veg</option>
                        <option value="snacks">🍟 Snacks</option>
                        <option value="beverages">☕ Beverages</option>
                        <option value="special">⭐ Campus Combos</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="newItemPrice">Price (₹) *</label>
                    <input type="number" id="newItemPrice" required min="1" step="0.01">
                </div>
                <div class="form-group">
                    <label for="newItemDescription">Description</label>
                    <input type="text" id="newItemDescription" placeholder="Brief description">
                </div>
                <div class="form-group">
                    <label for="newItemImage">Image URL</label>
                    <input type="text" id="newItemImage" placeholder="e.g., ./images/item.jpg">
                </div>
                <div class="modal-buttons">
                    <button type="button" class="modal-btn modal-btn-cancel" onclick="closeAddItemModal()">Cancel</button>
                    <button type="submit" class="modal-btn modal-btn-submit">Add Item</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/admin.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>

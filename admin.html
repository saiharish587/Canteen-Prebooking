<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BVRIT Canteen - Admin Panel</title>
    <style>
        :root{
            --bg: linear-gradient(135deg, #e0f7fa 0%, #f0f9ff 50%, #e8f5e9 100%);
            --card: #f0f9ff;
            --muted: #08202a;
            --accent: #00bcd4;
            --accent-2: #00e5c3;
            --shadow: rgba(2,6,23,0.08);
        }

        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:Inter,Segoe UI,system-ui,Arial;background:var(--bg);color:var(--muted);min-height:100vh}

        header{padding:18px 24px;background:linear-gradient(90deg,#d32f2f,#f44336);border-bottom:4px solid #ff6b6b;box-shadow:0 6px 20px var(--shadow)}
        .header-content{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:20px}
        .brand{display:flex;align-items:center;gap:14px}
        .logo{font-size:24px;font-weight:800;color:white}
        .tagline{font-size:13px;color:rgba(255,255,255,0.9)}
        .admin-badge{background:rgba(255,255,255,0.2);color:white;padding:6px 14px;border-radius:20px;font-weight:700;font-size:12px}
        .logout-btn{background:rgba(255,255,255,0.2);color:white;padding:8px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.3);cursor:pointer;font-weight:600;transition:all 0.2s}
        .logout-btn:hover{background:rgba(255,255,255,0.3)}

        .container{max-width:1400px;margin:0 auto;padding:24px}

        .admin-header{margin-bottom:40px}
        .admin-header h1{font-size:32px;color:#d32f2f;margin-bottom:12px}
        .admin-header p{color:#666;font-size:15px}

        .controls-section{background:white;padding:20px;border-radius:16px;margin-bottom:24px;box-shadow:0 4px 12px var(--shadow);display:flex;gap:16px;align-items:center;flex-wrap:wrap}
        .search-box{flex:1;min-width:250px;padding:10px 16px;border:2px solid rgba(0,188,212,0.2);border-radius:8px;font-size:14px;color:var(--muted)}
        .search-box:focus{outline:none;border-color:var(--accent)}
        .filter-btn{padding:10px 20px;border-radius:8px;border:2px solid rgba(0,188,212,0.2);background:white;cursor:pointer;font-weight:600;color:var(--muted);transition:all 0.2s}
        .filter-btn.active{background:linear-gradient(90deg,var(--accent),var(--accent-2));color:white;border-color:transparent}
        .add-item-btn{background:linear-gradient(90deg,#4caf50,#66bb6a);color:white;padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-weight:700;transition:all 0.2s}
        .add-item-btn:hover{transform:scale(1.05)}

        .items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}

        .item-card{background:white;border-radius:16px;overflow:hidden;box-shadow:0 4px 12px var(--shadow);border-left:5px solid var(--accent);transition:all 0.3s ease;position:relative}
        .item-card.unavailable{border-left-color:#ff6b6b;opacity:0.7}

        .item-image-container{position:relative;width:100%;height:180px;background:linear-gradient(135deg,#667eea,#764ba2);overflow:hidden;display:flex;align-items:center;justify-content:center;color:white;font-size:60px;font-weight:700}
        .item-image{width:100%;height:100%;object-fit:cover;transition:transform 0.3s ease;display:block}
        .item-image.failed{display:none !important}
        .item-image-container::after{content:'🍽️';position:absolute;font-size:60px;display:none}
        .item-image-container:has(.item-image.failed)::after{display:block}
        .item-image{width:100%;height:100%;object-fit:cover}
        .availability-badge{position:absolute;top:12px;right:12px;background:#4caf50;color:white;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700}
        .availability-badge.unavailable{background:#ff6b6b}

        .item-content{padding:16px}
        .item-name{font-size:18px;font-weight:800;color:var(--muted);margin-bottom:8px}
        .item-category{font-size:12px;color:#999;margin-bottom:12px}
        .item-price-section{display:flex;align-items:center;gap:12px;margin-bottom:16px}
        .item-price-label{color:#666;font-size:13px;font-weight:600}
        .item-price-input{width:100px;padding:8px;border:2px solid rgba(0,188,212,0.2);border-radius:6px;font-weight:700;color:var(--accent);font-size:14px}
        .item-price-input:focus{outline:none;border-color:var(--accent)}

        .item-controls{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
        .control-btn{padding:10px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:13px;transition:all 0.2s}
        .toggle-btn{background:linear-gradient(90deg,#2196f3,#1976d2);color:white}
        .toggle-btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(33,150,243,0.2)}
        .delete-btn{background:linear-gradient(90deg,#f44336,#e53935);color:white}
        .delete-btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(244,67,54,0.2)}

        /* Modal for adding items */
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999;align-items:center;justify-content:center}
        .modal.show{display:flex}
        .modal-content{background:white;border-radius:20px;padding:40px;width:90%;max-width:500px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
        .modal-title{font-size:24px;color:var(--muted);font-weight:800}
        .modal-close{background:transparent;border:none;font-size:28px;cursor:pointer;color:var(--muted)}
        .form-group{margin-bottom:16px}
        .form-group label{display:block;font-size:14px;font-weight:700;margin-bottom:6px;color:var(--muted)}
        .form-group input, .form-group select{width:100%;padding:10px;border:2px solid rgba(0,188,212,0.2);border-radius:8px;font-size:14px;color:var(--muted)}
        .form-group input:focus, .form-group select:focus{outline:none;border-color:var(--accent)}
        .modal-buttons{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:24px}
        .modal-btn{padding:12px;border-radius:8px;border:none;cursor:pointer;font-weight:700;transition:all 0.2s}
        .modal-btn-submit{background:linear-gradient(90deg,#4caf50,#66bb6a);color:white}
        .modal-btn-cancel{background:#f0f0f0;color:var(--muted)}

        .empty-state{text-align:center;padding:60px 20px;color:#999}
        .empty-state-icon{font-size:80px;margin-bottom:20px}

        @media (max-width:768px){
            .items-grid{grid-template-columns:1fr}
            .controls-section{flex-direction:column;align-items:stretch}
            .search-box{width:100%}
            .admin-header h1{font-size:24px}
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="brand">
                <div class="logo">🍽️ BVRIT CANTEEN</div>
                <div class="tagline">Admin Panel</div>
            </div>
            <div style="display:flex;gap:12px;align-items:center">
                <span class="admin-badge">⚙️ Admin Mode</span>
                <button class="logout-btn" onclick="viewMenu()" style="background:linear-gradient(90deg,#4caf50,#66bb6a);border-color:#4caf50">📋 View Menu</button>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="admin-header">
                <h1>🎛️ Menu Management</h1>
                <p>Edit prices, manage availability, and add/remove menu items</p>
            </div>

            <div class="controls-section">
                <input type="text" id="searchBox" class="search-box" placeholder="Search menu items...">
                <button class="filter-btn active" onclick="filterByCategory('all')">All Items</button>
                <button class="filter-btn" onclick="filterByCategory('available')">Available</button>
                <button class="filter-btn" onclick="filterByCategory('unavailable')">Unavailable</button>
                <button class="add-item-btn" onclick="openAddItemModal()">➕ Add New Item</button>
                <button class="add-item-btn" onclick="saveAllChanges()" style="background:linear-gradient(90deg,#2196f3,#1976d2)">💾 Save Changes</button>
                <button class="filter-btn" onclick="resetToDefaults()" style="background:#ff6b6b;color:white;border-color:#ff6b6b">🔄 Reset Defaults</button>
            </div>

            <div class="items-grid" id="itemsGrid">
                <!-- Items will be dynamically loaded here -->
            </div>
        </div>
    </main>

    <!-- Add Item Modal -->
    <div class="modal" id="addItemModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Add New Menu Item</h2>
                <button class="modal-close" onclick="closeAddItemModal()">✕</button>
            </div>
            <form id="addItemForm" onsubmit="addNewItem(event)">
                <div class="form-group">
                    <label for="newItemName">Item Name *</label>
                    <input type="text" id="newItemName" required>
                </div>
                <div class="form-group">
                    <label for="newItemCategory">Category *</label>
                    <select id="newItemCategory" required>
                        <option value="">Select Category</option>
                        <option value="breakfast">🌅 Breakfast</option>
                        <option value="meals">🍛 Meals</option>
                        <option value="veg">🥬 Veg</option>
                        <option value="nonveg">🍗 Non-Veg</option>
                        <option value="snacks">🍟 Snacks</option>
                        <option value="beverages">☕ Beverages</option>
                        <option value="special">⭐ Campus Combos</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="newItemPrice">Price (₹) *</label>
                    <input type="number" id="newItemPrice" required min="1" step="0.01">
                </div>
                <div class="form-group">
                    <label for="newItemDescription">Description</label>
                    <input type="text" id="newItemDescription" placeholder="Brief description">
                </div>
                <div class="form-group">
                    <label for="newItemImage">Image URL</label>
                    <input type="text" id="newItemImage" placeholder="e.g., ./images/item.jpg">
                </div>
                <div class="modal-buttons">
                    <button type="button" class="modal-btn modal-btn-cancel" onclick="closeAddItemModal()">Cancel</button>
                    <button type="submit" class="modal-btn modal-btn-submit">Add Item</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Check if user is admin
        const isAdmin = localStorage.getItem('bvrit_is_admin') === 'true';
        if(!isAdmin){
            alert('Access denied. Admin credentials required.');
            window.location.href = 'index.html';
        }

        let allItems = [];
        let filteredCategory = 'all';

        // Extract menu items from menu.html and create menu structure
        function createMenuItemsFromMenu(){

                { id: 18, name: 'Chicken Meals (Mini)', category: 'meals', price: 105, available: true, description: 'Limited Rice + Chicken Curry', image: './images/chicken_meals.avif' },
                { id: 19, name: 'Chicken + Chapati', category: 'meals', price: 100, available: true, description: 'Chapatis with chicken curry', image: './images/chicken_chapati.jpg' },

                // Snacks
                { id: 31, name: 'Samosa (2 pcs)', category: 'snacks', price: 20, available: true, description: 'Crispy pastry with potato', image: './images/61050397.avif' },
                { id: 32, name: 'Veg Puff (2 pcs)', category: 'snacks', price: 30, available: true, description: 'Flaky puff with veg filling', image: './images/CopyofLSD07524.webp' },

                { id: 36, name: 'Maggi Noodles', category: 'snacks', price: 40, available: true, description: 'Hot masala maggi', image: './images/hq720.jpg' },
                
                // Beverages
                { id: 37, name: 'Tea', category: 'beverages', price: 15, available: true, description: 'Hot masala chai', image: './images/ginger-tea-recipe-3.webp' },

                { id: 39, name: 'Thumps Up', category: 'beverages', price: 30, available: true, description: 'Energizing cola drink - 400ml', image: './images/thums-up-250.webp' },
                { id: 40, name: 'Mountain Dew', category: 'beverages', price: 30, available: true, description: 'Citrus soda with intense flavor - 400ml', image: './images/mountain-dew-2lt-1702624298919_SKU-1666_0.webp' },
                { id: 41, name: 'Pulpy', category: 'beverages', price: 30, available: true, description: 'Fruit juice with pulp - 400ml', image: './images/61D+jP7XKBL.jpg' },
                { id: 42, name: 'Maaza', category: 'beverages', price: 30, available: true, description: 'Mango fruit juice - 400ml', image: './images/maaza.jpg' },
                { id: 43, name: 'Nimboz', category: 'beverages', price: 30, available: true, description: 'Citrus flavored drink - 400ml', image: './images/265893_8-7-up-nimbooz-soft-drink-with-real-lemon-juice.webp' },
                { id: 44, name: 'Badam Milk', category: 'beverages', price: 45, available: true, description: 'Nutritious almond milk drink', image: './images/1276fff5-c071-45c2-88a5-fc5f0f05f2a4-SKU017161.webp' },
            ];
            return menuItems;
        }

        // Initialize menu items from localStorage or use menu items
        function initializeMenuItems(){
            let savedItems = JSON.parse(localStorage.getItem('bvrit_menu_items') || 'null');
            const defaultItems = createMenuItemsFromMenu();
            
            if(!savedItems){
                allItems = defaultItems;
                saveMenuItems();
            } else {
                // Update saved items with images from defaults if missing
                allItems = savedItems.map(saved => {
                    const defaultItem = defaultItems.find(d => d.id === saved.id || d.name === saved.name);
                    if(defaultItem && !saved.image){
                        saved.image = defaultItem.image;
                    }
                    return saved;
                });
                saveMenuItems();
            }
            
            renderItems();
        }

        // Reset menu to defaults with all images
        function resetToDefaults(){
            if(confirm('Reset all menu items to defaults? This will restore original prices and images.')){
                localStorage.removeItem('bvrit_menu_items');
                allItems = createMenuItemsFromMenu();
                saveMenuItems();
                renderItems();
                alert('Menu reset to defaults!');
            }
        }

        // Save all changes with visual feedback
        function saveAllChanges(){
            saveMenuItems();
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.innerHTML = '✅ Saved!';
            btn.style.background = 'linear-gradient(90deg,#4caf50,#66bb6a)';
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.background = 'linear-gradient(90deg,#2196f3,#1976d2)';
            }, 2000);
        }

        // Save menu items to localStorage
        function saveMenuItems(){
            localStorage.setItem('bvrit_menu_items', JSON.stringify(allItems));
        }

        // Render menu items
        function renderItems(){
            const grid = document.getElementById('itemsGrid');
            let itemsToShow = allItems;

            // Apply filters
            if(filteredCategory === 'available'){
                itemsToShow = allItems.filter(item => item.available);
            } else if(filteredCategory === 'unavailable'){
                itemsToShow = allItems.filter(item => !item.available);
            } else if(filteredCategory !== 'all'){
                itemsToShow = allItems.filter(item => item.category === filteredCategory);
            }

            // Apply search filter
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            if(searchTerm){
                itemsToShow = itemsToShow.filter(item => 
                    item.name.toLowerCase().includes(searchTerm) || 
                    item.category.toLowerCase().includes(searchTerm)
                );
            }

            if(itemsToShow.length === 0){
                grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">📭</div><p>No items found</p></div>';
                return;
            }

            grid.innerHTML = itemsToShow.map(item => {
                const imageUrl = item.image || './images/default.jpg';
                const html = `<div class="item-card ${!item.available ? 'unavailable' : ''}">
                    <div class="item-image-container" data-item="${item.name}">
                        <img src="${imageUrl}" alt="${item.name}" class="item-image" onload="this.classList.remove('failed')" onerror="this.classList.add('failed')">
                        <div class="availability-badge ${!item.available ? 'unavailable' : ''}">
                            ${item.available ? '✓ Available' : '✕ Unavailable'}
                        </div>
                    </div>
                    <div class="item-content">
                        <div class="item-name">${item.name}</div>
                        <div class="item-category">${item.category}</div>
                        <div class="item-price-section">
                            <label class="item-price-label">Price: ₹</label>
                            <input type="number" class="item-price-input" value="${item.price}" onchange="updatePrice(${item.id}, this.value)">
                        </div>
                        <div class="item-controls">
                            <button class="control-btn toggle-btn" onclick="toggleAvailability(${item.id})">
                                ${item.available ? '🚫 Mark Unavailable' : '✅ Mark Available'}
                            </button>
                            <button class="control-btn delete-btn" onclick="deleteItem(${item.id})">🗑️ Delete</button>
                        </div>
                    </div>
                </div>`;
                return html;
            }).join('');
        }
        

        // Update price
        function updatePrice(id, newPrice){
            const item = allItems.find(i => i.id === id);
            if(item){
                item.price = parseFloat(newPrice) || item.price;
                saveMenuItems();
                renderItems();
            }
        }

        // Toggle availability
        function toggleAvailability(id){
            const item = allItems.find(i => i.id === id);
            if(item){
                item.available = !item.available;
                saveMenuItems();
                renderItems();
            }
        }

        // Delete item
        function deleteItem(id){
            if(confirm('Are you sure you want to delete this item?')){
                allItems = allItems.filter(i => i.id !== id);
                saveMenuItems();
                renderItems();
            }
        }

        // Filter by category
        function filterByCategory(category){
            filteredCategory = category;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderItems();
        }

        // Search functionality
        document.getElementById('searchBox').addEventListener('input', () => {
            renderItems();
        });

        // Modal functions
        function openAddItemModal(){
            document.getElementById('addItemModal').classList.add('show');
        }

        function closeAddItemModal(){
            document.getElementById('addItemModal').classList.remove('show');
            document.getElementById('addItemForm').reset();
        }

        function addNewItem(event){
            event.preventDefault();
            
            const name = document.getElementById('newItemName').value.trim();
            const category = document.getElementById('newItemCategory').value;
            const price = parseFloat(document.getElementById('newItemPrice').value);
            const description = document.getElementById('newItemDescription').value.trim();
            const image = document.getElementById('newItemImage').value.trim();

            if(!name || !category || !price){
                alert('Please fill all required fields');
                return;
            }

            const newId = Math.max(...allItems.map(i => i.id), 0) + 1;
            allItems.push({
                id: newId,
                name,
                category,
                price,
                description: description || 'No description',
                image: image || './images/default.jpg',
                available: true
            });

            saveMenuItems();
            renderItems();
            closeAddItemModal();
            alert('Item added successfully!');
        }

        // View menu page to check changes
        function viewMenu(){
            // Save current changes before viewing
            saveMenuItems();
            // Open menu in new tab so admin can check changes
            window.open('menu.html', '_blank');
        }

        function logout(){
            localStorage.removeItem('bvrit_current_user');
            localStorage.removeItem('bvrit_is_admin');
            window.location.href = 'index.html';
        }

        // Initialize
        initializeMenuItems();
    </script>
</body>
</html>
